<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <title>Document</title>
</head>
<body>
 <header class="site-header">
   <div class="header-wrapper">
      <div class="top-header">
                    <!-- LOGO -->
          <div class="logo">
            <img src="../images/logo.avif" alt="AliExpress">
          </div>
               <!-- SEARCH -->
          <form class="search-bar">
            <input type="text" placeholder="Skimasks">
            <button type="button" class="image-search">
              <img src="../images/search-by-image.jpg" alt="Search by image">
            </button>
            <button type="submit" class="search-btn">
              <img src="../images/search-by-image.jpg" alt="Search" >
            </button>
          </form>
                 <!-- RIGHT SIDE -->
          <div class="right-side">
            <div class="app-download">
              <img src="../images/search-by-image.jpg" alt="">
              <span>Download the<br>AliExpress app</span>
            </div>
            <div class="language">
              <img src="../images/search-by-image.jpg" alt="">
              <span>EN/<br> ETB ▾</span>
            </div>
            <div class="account">
              <img src="../images/search-by-image.jpg" alt="">
              <span>Welcome<br>Sign in / Register</span>
            </div>
            <div class="cart">
              <img src="../images/search-by-image.jpg" alt="">
              <div>
                <span class="cart-count">0</span><br/>
                <span>Cart</span></div>
              </div>
            </div>
          </div> 
     </div>
            <!-- NAV -->
      <nav class="nav-bar">
        <div class="side-nav">
          <button class="category-btn">
            <img src="../images/search-by-image.jpg" alt="">
            All Categories
          </button>
        </div>
       <div class="top-nav-links">
        <a href="#" class="active">Choice</a>
        <a href="#">SuperDeals</a>
        <a href="#">AliExpress Business</a>
        <a href="#">Automotive</a>
        <a href="#">Appliances</a>
        <a href="#">Women's Clothing</a>
        <a href="#">Men's Clothing</a>
        <a href="#">Toys & Games</a>
        <a href="#">Furniture</a>
        <a href="#">More</a>
       </div>
      </nav>
    </div>
    </header>
    <main>
      <section class="banner-section">       
      </section>
      <section class="todays-deal-section">
      </section>
    </main>
    <footer>

    </footer>
    <script src="../scripts/myHeader.js"></script>
</body>
</html>
